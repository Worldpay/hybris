<div
  class="wp__apm"
  [class.wp__apm--selected]="(selectedApm$ | async)?.code === apm.code"
>
  <div class="d-flex align-items-center">
    <span class="wp__apm--selector mr-2"></span>
    <p class="wp__apm-label">{{ apm.name }}</p>
  </div>
  <cx-media [container]="apm.media"></cx-media>
</div>
