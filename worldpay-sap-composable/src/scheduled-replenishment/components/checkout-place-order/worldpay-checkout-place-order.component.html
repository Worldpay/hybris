<form class="cx-place-order-form form-check" [formGroup]="checkoutSubmitForm">
  <div class="form-group">
    <label>
      <input
        formControlName="termsAndConditions"
        class="scaled-input form-check-input"
        type="checkbox"
        />
      <span class="form-check-label">
        {{ 'checkoutReview.confirmThatRead' | cxTranslate }}
        <a
          [routerLink]="{ cxRoute: 'termsAndConditions' } | cxUrl"
          class="cx-tc-link"
          target="_blank"
          rel="noopener noreferrer"
          >
          {{ 'checkoutReview.termsAndConditions' | cxTranslate }}
        </a>
      </span>
    </label>
  </div>

  <button
    (click)="submitForm()"
    class="btn btn-primary btn-block btn-submit"
    [disabled]="termsAndConditionInvalid || (daysOfWeekNotChecked$ | async)"
    [cxAtMessage]="'checkoutReview.orderInProcess' | cxTranslate"
    >
    {{ 'checkoutReview.placeOrder' | cxTranslate }}
  </button>
</form>

@if (ddcIframeUrl$ | async) {
  <iframe
    [src]="ddcIframeUrl$ | async"
    height="1"
    style="visibility: hidden"
    width="1"
  ></iframe>
}

@if (challengeIframeUrl$ | async; as challengeIframeUrl) {
  <div
    class="wp-challenge"
    >
    <iframe
      [height]="challengeIframeHeight"
      [src]="challengeIframeUrl"
      [width]="challengeIframeWidth"
    ></iframe>
  </div>
}

@if (redirectData$ | async; as redirectData) {
  <div
    class="d-none"
    >
    <form
      [action]="redirectData.postUrl"
      id="redirect-form"
      method="GET"
      ngNoForm
      >
      @for (queryParams of queryParams; track queryParams) {
        <input
          [name]="queryParams.key"
          [value]="queryParams.value"
          type="hidden"
          />
      }
      @for (redirectParameter of redirectData.parameters?.entry; track redirectParameter) {
        <input
          [name]="redirectParameter.key"
          [value]="redirectParameter.value"
          type="hidden"
          />
      }
    </form>
  </div>
}
