<ng-container *ngIf="(error$ | async) as errorMessage ; else showPaymentOption">
  <p class="alert alert-danger">{{ errorMessage }}</p>
</ng-container>

<ng-template #showPaymentOption>
  <div class="mt-3">
    <y-worldpay-billing-address></y-worldpay-billing-address>
  </div>
</ng-template>

<div class="cx-checkout-btns row d-flex align-items-center">
  <div class="col-sm-12 col-md-6">
    <button
      class="btn btn-block btn-secondary btn-back"
      (click)="onBack()"
    >
      {{ 'common.back' | cxTranslate }}
    </button>
  </div>
  <div class="col-sm-12 col-md-6">
    <div class="w-full" #gpayBtn></div>
  </div>
</div>
